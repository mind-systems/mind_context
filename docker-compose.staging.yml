name: mind_staging

services:
  mind_database_staging_host:
    image: postgres:17-alpine
    restart: unless-stopped
    env_file:
      - ./mind_api/.env.staging
    volumes:
      - db_staging_data:/var/lib/postgresql/data
    networks:
      - mind_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  mind_api:
    build:
      context: ./mind_api
      target: production
    restart: unless-stopped
    env_file:
      - ./mind_api/.env.staging
    ports:
      - "3001:3001"
      - "50052:50052"
    depends_on:
      mind_database_staging_host:
        condition: service_healthy
    networks:
      - mind_net
    healthcheck:
      test: ["CMD", "sh", "-c", "wget --no-verbose --tries=1 --spider http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  mind_web:
    build:
      context: ./mind_web
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_OTLP_ENDPOINT: ${VITE_OTLP_ENDPOINT}
        VITE_OTLP_AUTH_TOKEN: ${VITE_OTLP_AUTH_TOKEN}
    restart: unless-stopped
    ports:
      - "8001:80"
    depends_on:
      mind_api:
        condition: service_healthy
    networks:
      - mind_net

volumes:
  db_staging_data:

networks:
  mind_net:
    driver: bridge
